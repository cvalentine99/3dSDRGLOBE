name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm check

      - name: Run tests
        run: pnpm test
        env:
          # Provide minimal env vars so tests can import modules without crashing
          NODE_ENV: test
          DATABASE_URL: "mysql://test:test@localhost:3306/test"
          JWT_SECRET: "ci-test-secret-key-not-for-production"
          VITE_APP_ID: "ci-test-app"
          OAUTH_SERVER_URL: "https://example.com"
          VITE_OAUTH_PORTAL_URL: "https://example.com"
          OWNER_OPEN_ID: "ci-test-owner"
          OWNER_NAME: "CI Test"
          BUILT_IN_FORGE_API_URL: "https://example.com"
          BUILT_IN_FORGE_API_KEY: "ci-test-key"
          VITE_FRONTEND_FORGE_API_KEY: "ci-test-key"
          VITE_FRONTEND_FORGE_API_URL: "https://example.com"
          VITE_APP_TITLE: "Radio Globe CI"
          VITE_APP_LOGO: ""
          TDOA_AUTH_KEY: "ci-test-tdoa-key"
          ACLED_EMAIL: "test@example.com"
          ACLED_PASSWORD: "test"

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build
        env:
          NODE_ENV: production
          DATABASE_URL: "mysql://test:test@localhost:3306/test"
          JWT_SECRET: "ci-build-secret"
          VITE_APP_ID: "ci-build-app"
          OAUTH_SERVER_URL: "https://example.com"
          VITE_OAUTH_PORTAL_URL: "https://example.com"
          OWNER_OPEN_ID: "ci-build-owner"
          OWNER_NAME: "CI Build"
          BUILT_IN_FORGE_API_URL: "https://example.com"
          BUILT_IN_FORGE_API_KEY: "ci-build-key"
          VITE_FRONTEND_FORGE_API_KEY: "ci-build-key"
          VITE_FRONTEND_FORGE_API_URL: "https://example.com"
          VITE_APP_TITLE: "Radio Globe CI"
          VITE_APP_LOGO: ""
